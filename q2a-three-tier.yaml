
# =========================================================================
# TIER 1: INTERNAL DATA SUITE (MySQL & Redis) - Internal Network Zone
# =========================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: internal-db
spec:
  serviceName: "mysql-internal"
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:9.6.0  # Kept exactly to match your testing spec
        # FIX: Dynamically alters the database runtime authentication rules on boot
        env:
        - name: MYSQL_ARGUMENTS
          value: "--authentication_policy=mysql_native_password"
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: q2a-secrets
              key: db-root-password
        - name: MYSQL_DATABASE
          value: q2a
        - name: MYSQL_USER
          value: q2auser
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: q2a-secrets
              key: db-password
        ports:
        - containerPort: 3306
          name: mysql
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/mysql
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: mysql-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db  # Matches the DB_HOST string exactly
spec:
  ports:
  - port: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: internal-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6369
---
apiVersion: v1
kind: Service
metadata:
  name: redis  # Matches the REDIS_HOST string exactly
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
# =========================================================================
# TIER 2: COMPUTE COMPUTE POOL (Q2A Replicas) - DMZ Zone
# =========================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: q2a-app
spec:
  replicas: 5  # Replicates your dynamic '--scale q2a=5' testing scenario
  selector:
    matchLabels:
      app: q2a-engine
  template:
    metadata:
      labels:
        app: q2a-engine
    spec:
      containers:
      - name: q2a
        image: carlosgerez/my-q2a:1.3  # Running your precise public image version
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        env:
        - name: DB_HOST
          value: "db"  # Resolves automatically to the MySQL Service DNS internally
        - name: DB_NAME
          value: q2a
        - name: DB_USER
          value: q2auser
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: q2a-secrets
              key: db-password
        - name: REDIS_HOST
          value: "redis"  # Resolves automatically to the Redis Service DNS internally
---
apiVersion: v1
kind: Service
metadata:
  name: q2a-internal-service
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: q2a-engine
---
# =========================================================================
# TIER 3: REVERSE PROXY / INGRESS CONTROL - Public Egress Zone
# =========================================================================
# Instead of configuring a manual Nginx container, K3s includes Traefik out-of-the-box.
# But since you have a specific NodePort scheme, we will expose the pool via a LoadBalancer service
apiVersion: v1
kind: Service
metadata:
  name: public-proxy-service
spec:
  type: NodePort
  ports:
  - port: 80         # Internal cluster port
    targetPort: 80   # Forwards to your Q2A application pods
    nodePort: 30080  # Accessible directly from your Kali host-only browser
  selector:
    app: q2a-engine